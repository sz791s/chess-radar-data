name: Update Chess Events

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update-events:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate events.json
        run: python scripts/generate_events.py

      - name: Commit updated events.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update events feed"
          file_pattern: events.json
