name: Update Chess Data Feeds

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update-feeds:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate JSON feeds
        run: python scripts/generate_events.py

      - name: Commit updated JSON feeds
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update chess data feeds"
          file_pattern: events.json event_players.json channels.json players_confirmed.json players_open.json players_women.json
